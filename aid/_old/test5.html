<html>
<head>
<script src="jquery-3.5.1.js"></script>


<!-- ><link rel="stylesheet" href="http://fonts.googleapis.com/css?family=Open+Sans:300,400,700">-->

<link rel="stylesheet" href="jquery.mobile-1.4.5/demos/_assets/css/jqm-demos.css">
<script src="jquery.mobile-1.4.5/demos/js/jquery.js"></script>
<script src="jquery.mobile-1.4.5/demos/_assets/js/index.js"></script>
<link rel="stylesheet" href="jquery.mobile-1.4.5/demos/css/themes/default/jquery.mobile-1.4.5.min.css">
<script src="jquery.mobile-1.4.5/demos/js/jquery.mobile-1.4.5.min.js"></script>

</head>

<body>
<div id="aid" data-role="collapsible-set" data-theme="a" data-inset="false">
</div>

<div data-role="collapsible-set" data-theme="a" data-inset="false">
    <div data-role="collapsible">
    <h2>Mailbox</h2>
        <ul data-role="listview">
            <li><a href="index.html">Inbox <span class="ui-li-count">12</span></a></li>
            <li><a href="index.html">Outbox <span class="ui-li-count">0</span></a></li>
            <li><a href="index.html">Drafts <span class="ui-li-count">4</span></a></li>
            <li><a href="index.html">Sent <span class="ui-li-count">328</span></a></li>
            <li><a href="index.html">Trash <span class="ui-li-count">62</span></a></li>
        </ul>
    </div>
</div>

</div>
		
<script>

$( document ).ready(function() {
	myInit();
});


function myInit() {
	var xhttp = new XMLHttpRequest();
	xhttp.onreadystatechange = function() {
		if (this.readyState == 4 && this.status == 200) {
			myFunction(this);
		}
	};
	xhttp.open("GET", "https://dberk.org/aid/2.0/aid-data.xml", true);
	xhttp.send();
}

function myFunction(xml) {
	var xmlDoc = xml.responseXML;
	
	var txt = '';
	allLevels = xmlDoc.getElementsByTagName("level");  
	txt += '<div data-role="collapsible">'
	txt += '<ul data-role="listview">'
	for (i=0; i<allLevels.length; i++) {
		x = allLevels[i];
		y = x.getAttributeNode("label");
		txt += '<li>' + y.nodeValue + '</li>';


		allTopics = allLevels[i].getElementsByTagName("topic");
		txt += '<div data-role="collapsible">'
		txt += '<ul data-role="listview">'
		for (j=0; j<allTopics.length; j++) {
			xx = allTopics[j];
			yy = xx.getAttributeNode("label");
			txt += '<li>' + yy.nodeValue + '</li>';

			allIdioms = allTopics[j].getElementsByTagName("idiom");
			txt += '<div data-role="collapsible">'
			txt += '<ul data-role="listview">'
			for (k=0; k<allIdioms.length; k++) {
				xxx = allIdioms[k];
				yyy = xxx.getAttributeNode("label");
				txt += '<li>' + yyy.nodeValue + '</li>';
			}
			txt += '</ul></div>';
		}
		txt += '</ul></div>';
	}
	txt += '</ul></div>';
	document.getElementById("aid").innerHTML = txt;
}
</script>

</body>
</html>
