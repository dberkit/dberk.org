<html>
<head>
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>

</head>

<body>
<div class="accordion" id="accordionExample">

  <div class="card">
    <div class="card-header" id="headingOne">
      <h2 class="mb-0">
        <button class="btn btn-link collapsed" type="button" data-toggle="collapse" data-target="#collapseOne" aria-expanded="false" aria-controls="collapseOne">
          Basic Diatonic Harmony
        </button>
      </h2>
    </div>
    <div id="collapseOne" class="collapse" aria-labelledby="headingOne" data-parent="#accordionExample">
      <div class="card-body">
		Level 1 items go here.
      </div>
    </div>
  </div>
  
  <div class="card">
    <div class="card-header" id="headingTwo">
      <h2 class="mb-0">
        <button class="btn btn-link collapsed" type="button" data-toggle="collapse" data-target="#collapseTwo" aria-expanded="false" aria-controls="collapseTwo">
          Advanced Diatonic Harmony
        </button>
      </h2>
    </div>
    <div id="collapseTwo" class="collapse" aria-labelledby="headingTwo" data-parent="#accordionExample">
      <div class="card-body">
		Level 2 items go here.
      </div>
    </div>
  </div>
  
  <div class="card">
    <div class="card-header" id="headingThree">
      <h2 class="mb-0">
        <button class="btn btn-link collapsed" type="button" data-toggle="collapse" data-target="#collapseThree" aria-expanded="false" aria-controls="collapseThree">
          Basic Chromatic Harmony
        </button>
      </h2>
    </div>
    <div id="collapseThree" class="collapse" aria-labelledby="headingThree" data-parent="#accordionExample">
      <div class="card-body">
		Level 3 items go here.
      </div>
    </div>
  </div>
</div>	

  <div class="card">
    <div class="card-header" id="headingFour">
      <h2 class="mb-0">
        <button class="btn btn-link collapsed" type="button" data-toggle="collapse" data-target="#collapseFour" aria-expanded="false" aria-controls="collapseFour">
          Advanced Chromatic Harmony
        </button>
      </h2>
    </div>
    <div id="collapseFour" class="collapse" aria-labelledby="headingFour" data-parent="#accordionExample">
      <div class="card-body">
		Level 4 items go here.
      </div>
    </div>
  </div>
</div>	


<div id="aid">
		
<script>

myInit();


function myInit() {
	var xhttp = new XMLHttpRequest();
	xhttp.onreadystatechange = function() {
		if (this.readyState == 4 && this.status == 200) {
			myFunction(this);
		}
	};
	xhttp.open("GET", "https://dberk.org/aid/2.0/aid-data.xml", true);
	xhttp.send();
}

function myFunction(xml) {
	var xmlDoc = xml.responseXML;
	
	var txt = '';
	allLevels = xmlDoc.getElementsByTagName("level");  
	txt += '<div data-role="collapsible">'
	txt += '<ul data-role="listview">'
	for (i=0; i<allLevels.length; i++) {
		x = allLevels[i];
		y = x.getAttributeNode("label");
		txt += '<li>' + y.nodeValue + '</li>';


		allTopics = allLevels[i].getElementsByTagName("topic");
		txt += '<div data-role="collapsible">'
		txt += '<ul data-role="listview">'
		for (j=0; j<allTopics.length; j++) {
			xx = allTopics[j];
			yy = xx.getAttributeNode("label");
			txt += '<li>' + yy.nodeValue + '</li>';

			allIdioms = allTopics[j].getElementsByTagName("idiom");
			txt += '<div data-role="collapsible">'
			txt += '<ul data-role="listview">'
			for (k=0; k<allIdioms.length; k++) {
				xxx = allIdioms[k];
				yyy = xxx.getAttributeNode("label");
				txt += '<li>' + yyy.nodeValue + '</li>';
			}
			txt += '</ul></div>';
		}
		txt += '</ul></div>';
	}
	txt += '</ul></div>';
	document.getElementById("aid").innerHTML = txt;
}
</script>

</body>
</html>
